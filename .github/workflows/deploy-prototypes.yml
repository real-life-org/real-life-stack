name: Deploy

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-prototypes.yml'
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: 'OTA rollback: release tag to restore (e.g. ota-a3f9c12). Leave empty for normal deploy.'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Checkout web-of-trust (for linked packages)
        uses: actions/checkout@v4
        with:
          repository: antontranelis/web-of-trust
          path: .wot

      - name: Build web-of-trust packages
        working-directory: .wot
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @real-life/wot-core build
          pnpm --filter @real-life/adapter-yjs build

      - name: Install dependencies
        run: |
          sed -i 's|link:../web-of-trust/|link:.wot/|g' package.json
          sed -i 's|"@real-life/adapter-yjs": "^0.1.0"|"@real-life/adapter-yjs": "link:../../.wot/packages/adapter-yjs"|g' packages/wot-connector/package.json
          pnpm install --no-frozen-lockfile

      - name: Build packages (data-interface, toolkit, connectors)
        run: |
          pnpm --filter @real-life-stack/data-interface build
          pnpm --filter @real-life-stack/toolkit build
          pnpm --filter @real-life-stack/mock-connector --filter @real-life-stack/local-connector build
          pnpm --filter @real-life-stack/wot-connector build

      - name: Build landing page
        run: pnpm --filter landing build
        env:
          VITE_BASE_PATH: /

      - name: Build reference app (ios)
        run: pnpm --filter reference build
        env:
          VITE_BASE_PATH: /app/
          VITE_UPDATE_SERVER_URL: https://real-life-stack.de
          VITE_UPDATE_CHANNEL: ios

      - name: Zip iOS bundle
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          (cd apps/reference/dist && zip -r "../../../bundle-ios-${SHORT_SHA}.zip" .)

      - name: Build reference app (android)
        run: pnpm --filter reference build
        env:
          VITE_BASE_PATH: /app/
          VITE_UPDATE_SERVER_URL: https://real-life-stack.de
          VITE_UPDATE_CHANNEL: android

      - name: Zip Android bundle
        run: cd apps/reference/dist && zip -r "../../../bundle-android-${SHORT_SHA}.zip" .

      - name: Build reference app (android-foss)
        run: pnpm --filter reference build
        env:
          VITE_BASE_PATH: /app/
          VITE_UPDATE_SERVER_URL: https://real-life-stack.de
          VITE_UPDATE_CHANNEL: android-foss
          # TODO: add FOSS-specific env vars here once push notifications are implemented

      - name: Zip Android FOSS bundle
        run: cd apps/reference/dist && zip -r "../../../bundle-android-foss-${SHORT_SHA}.zip" .

      - name: Build prototype
        working-directory: apps/prototype
        run: pnpm tsc -b && pnpm vite build --base="/edge/"

      - name: Build Storybook
        run: pnpm build:storybook

      - name: Create GitHub Release with OTA bundles
        if: inputs.rollback_tag == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "ota-${SHORT_SHA}" \
            --title "OTA ${SHORT_SHA}" \
            --notes "Automatic OTA release from commit ${SHORT_SHA}" \
            bundle-ios-${SHORT_SHA}.zip \
            bundle-android-${SHORT_SHA}.zip \
            bundle-android-foss-${SHORT_SHA}.zip

      - name: Generate latest.json (normal deploy)
        if: inputs.rollback_tag == ''
        run: |
          REPO="${{ github.repository }}"
          for channel in ios android android-foss; do
            mkdir -p gh-pages-ota/updates/${channel}
            printf '{"bundleId":"%s","url":"%s"}\n' \
              "${SHORT_SHA}" \
              "https://github.com/${REPO}/releases/download/ota-${SHORT_SHA}/bundle-${channel}-${SHORT_SHA}.zip" \
              > gh-pages-ota/updates/${channel}/latest.json
          done

      - name: Generate latest.json (rollback)
        if: inputs.rollback_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ inputs.rollback_tag }}"
          BUNDLE_ID="${TAG#ota-}"
          for channel in ios android android-foss; do
            mkdir -p gh-pages-ota/updates/${channel}
            printf '{"bundleId":"%s","url":"%s"}\n' \
              "${BUNDLE_ID}" \
              "https://github.com/${REPO}/releases/download/${TAG}/bundle-${channel}-${BUNDLE_ID}.zip" \
              > gh-pages-ota/updates/${channel}/latest.json
          done
          echo "Rolling back OTA to ${TAG}"

      - name: Prepare deployment
        run: |
          mkdir -p gh-pages/app gh-pages/edge gh-pages/storybook
          cp -R apps/landing/dist/. gh-pages/
          cp -R apps/reference/dist/. gh-pages/app/
          cp apps/reference/public/404.html gh-pages/404.html
          cp -R apps/prototype/dist/. gh-pages/edge/
          cp -R packages/toolkit/storybook-static/. gh-pages/storybook/
          cp -R gh-pages-ota/updates/. gh-pages/updates/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
