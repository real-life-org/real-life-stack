name: Deploy

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-prototypes.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Checkout web-of-trust (for linked packages)
        uses: actions/checkout@v4
        with:
          repository: antontranelis/web-of-trust
          path: .wot

      - name: Build web-of-trust packages
        working-directory: .wot
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @real-life/wot-core build
          pnpm --filter @real-life/adapter-yjs build

      - name: Install dependencies
        run: |
          # Rewrite link: overrides to point to .wot/ instead of ../web-of-trust/
          sed -i 's|link:../web-of-trust/|link:.wot/|g' package.json
          # Also rewrite wot-connector's dependency to use local link
          sed -i 's|"@real-life/adapter-yjs": "^0.1.0"|"@real-life/adapter-yjs": "link:../../.wot/packages/adapter-yjs"|g' packages/wot-connector/package.json
          pnpm install --no-frozen-lockfile

      - name: Build packages (data-interface, toolkit, connectors)
        run: |
          pnpm --filter @real-life-stack/data-interface build
          pnpm --filter @real-life-stack/toolkit build
          pnpm --filter @real-life-stack/mock-connector --filter @real-life-stack/local-connector build
          pnpm --filter @real-life-stack/wot-connector build

      - name: Build landing page
        run: pnpm --filter landing build
        env:
          VITE_BASE_PATH: /

      - name: Build reference app
        run: pnpm --filter reference build
        env:
          VITE_BASE_PATH: /app/
          VITE_UPDATE_SERVER_URL: https://real-life-stack.de

      - name: Build prototype
        working-directory: apps/prototype
        run: pnpm tsc -b && pnpm vite build --base="/edge/"

      - name: Build Storybook
        run: pnpm build:storybook

      - name: Prepare deployment
        run: |
          mkdir -p gh-pages/app gh-pages/edge gh-pages/storybook
          # Landing page at root
          cp -R apps/landing/dist/. gh-pages/
          # Reference app at /app/
          cp -R apps/reference/dist/. gh-pages/app/
          # SPA 404 handler must be at site root for GitHub Pages
          cp apps/reference/public/404.html gh-pages/404.html
          # Prototype at /edge/
          cp -R apps/prototype/dist/. gh-pages/edge/
          # Storybook at /storybook/
          cp -R packages/toolkit/storybook-static/. gh-pages/storybook/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
