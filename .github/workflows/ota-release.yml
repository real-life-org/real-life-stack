name: OTA Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Bundle version (e.g. 1.0.2)'
        required: true
        type: string
      channels:
        description: 'Channels to release (comma-separated: ios,android,android-foss)'
        required: true
        default: 'ios,android,android-foss'
        type: string

permissions:
  contents: write   # GitHub Release + gh-pages commit
  pages: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.channel }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        channel: [ios, android, android-foss]
    steps:
      - name: Skip if channel not selected
        id: check
        run: |
          if echo "${{ inputs.channels }}" | grep -qw "${{ matrix.channel }}"; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.check.outputs.skip == 'false'
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Checkout web-of-trust (for linked packages)
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: antontranelis/web-of-trust
          path: .wot

      - name: Build web-of-trust packages
        if: steps.check.outputs.skip == 'false'
        working-directory: .wot
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @real-life/wot-core build
          pnpm --filter @real-life/adapter-yjs build

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: |
          sed -i 's|link:../web-of-trust/|link:.wot/|g' package.json
          sed -i 's|"@real-life/adapter-yjs": "^0.1.0"|"@real-life/adapter-yjs": "link:../../.wot/packages/adapter-yjs"|g' packages/wot-connector/package.json
          pnpm install --no-frozen-lockfile

      - name: Build packages
        if: steps.check.outputs.skip == 'false'
        run: |
          pnpm --filter @real-life-stack/data-interface build
          pnpm --filter @real-life-stack/toolkit build
          pnpm --filter @real-life-stack/mock-connector --filter @real-life-stack/local-connector build
          pnpm --filter @real-life-stack/wot-connector build

      - name: Build reference app (${{ matrix.channel }})
        if: steps.check.outputs.skip == 'false'
        run: pnpm --filter reference build
        env:
          VITE_BASE_PATH: /app/
          VITE_UPDATE_SERVER_URL: https://real-life-stack.de
          VITE_UPDATE_CHANNEL: ${{ matrix.channel }}
          # TODO: android-foss uses a different push notification provider (no FCM).
          # Add channel-specific secrets here once push notifications are implemented.

      - name: Create bundle zip
        if: steps.check.outputs.skip == 'false'
        run: |
          cd apps/reference/dist
          zip -r "../../../bundle-${{ matrix.channel }}-${{ inputs.version }}.zip" .

      - name: Write latest.json
        if: steps.check.outputs.skip == 'false'
        run: |
          printf '{"bundleId":"%s","url":"%s"}\n' \
            "${{ inputs.version }}" \
            "https://github.com/${{ github.repository }}/releases/download/ota-${{ inputs.version }}/bundle-${{ matrix.channel }}-${{ inputs.version }}.zip" \
            > latest-${{ matrix.channel }}.json

      - name: Upload artifacts
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ota-${{ matrix.channel }}
          path: |
            bundle-${{ matrix.channel }}-${{ inputs.version }}.zip
            latest-${{ matrix.channel }}.json

  release:
    name: Publish Release & update gh-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release and upload zips
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Collect all zip files
          ZIPS=$(find artifacts/ -name "*.zip" | tr '\n' ' ')

          gh release create "ota-${{ inputs.version }}" \
            --title "OTA ${{ inputs.version }}" \
            --notes "Web bundle update ${{ inputs.version }} for channels: ${{ inputs.channels }}" \
            $ZIPS

      - name: Update latest.json files on gh-pages
        run: |
          for json in artifacts/ota-*/latest-*.json; do
            # Extract channel name from filename: latest-ios.json → ios
            filename=$(basename "$json")
            channel="${filename#latest-}"
            channel="${channel%.json}"

            mkdir -p "updates/${channel}"
            cp "$json" "updates/${channel}/latest.json"
            echo "Updated updates/${channel}/latest.json"
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates/
          git commit -m "chore: OTA latest.json for version ${{ inputs.version }} (channels: ${{ inputs.channels }})"
          git push origin gh-pages
