<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Real Life Stack - Reference App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA: restore path from 404.html redirect
      (function() {
        var q = window.location.search.slice(1)
        if (q && !q.includes('=')) {
          var base = '/app/'
          history.replaceState(null, '', base + q + window.location.hash)
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
