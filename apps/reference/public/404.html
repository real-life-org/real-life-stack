<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Real Life Stack</title>
    <script>
      // GitHub Pages SPA redirect
      // Redirects all 404s to index.html, preserving the path
      var base = '/app/'
      var path = window.location.pathname
      if (path.startsWith(base)) {
        var route = path.slice(base.length)
        window.location.replace(base + '?' + route + window.location.hash)
      } else {
        window.location.replace(base)
      }
    </script>
  </head>
  <body></body>
</html>
